# Terms of Service

**Version**: 2.0
**Last updated**: 2026-04-21
**Effective date**: TBD

---

## 1. Acceptance

By creating an account or using the Sloth Lab Career app (the "**App**"),
you agree to these Terms of Service (the "**Terms**") and our
[Privacy Policy](privacy.html). If you don't agree, don't use the App.

## 2. Who May Use the App

- You must be at least 16 years old.
- You must be able to form a binding contract in your jurisdiction.
- The App is available in the US, EU member states, UK, Canada, Australia,
  South Korea, Japan, and other regions where App Store / Play Store
  distribute the App. If local law prohibits any part of these Terms, the
  rest still applies.

## 3. Accounts

- One account per person.
- Keep your login (email + magic link or Google account) secure.
- You're responsible for activity on your account until you notify us of
  compromise.

## 4. What the App Does (and Doesn't)

### 4.1 What we provide
- **AI career diagnosis** — suggestions for career transitions, based on
  your résumé or questionnaire, produced by a large language model (Gemini).
- **Interview practice** — AI-generated questions, audio recording,
  transcription, and STAR-structured feedback.
- **Goal tracking** — simple CRUD for career goals and progress.
- **Subscription management** — via RevenueCat + the App Store /
  Play Store.

### 4.2 What the App is NOT
- **Not professional advice.** Nothing in the App is legal, medical,
  financial, or career-counseling advice in the professional sense. Our
  AI output is a recommendation; **the final decision is always yours**.
- **Not a guarantee of employment.** Using the App does not guarantee you'll
  get a job, promotion, or any specific outcome. We do not promise interview
  success.
- **Not an emergency service.** If you are in crisis, contact a qualified
  mental health professional or emergency services in your area.

## 5. Subscriptions & Billing

### 5.1 Plans
Pricing is shown in-app and may vary by region. Current plans (subject to
change):

- **Free trial**: 7 days, full access
- **Premium weekly**: auto-renewing every 7 days
- **Premium monthly**: auto-renewing every month

### 5.2 Auto-renewal
Subscriptions auto-renew unless you cancel at least 24 hours before the
current period ends. You cancel through your App Store / Play Store account —
the App surfaces a "Manage subscription" deep link in settings.

### 5.3 Refunds
Refunds are governed by App Store / Play Store policy. We generally cannot
issue a direct refund; contact the store.

### 5.4 Price changes
We may change subscription prices. For existing subscribers, changes take
effect at the next renewal after at least 30 days' notice.

### 5.5 Financial hardship program
Users experiencing financial hardship can request 30 days of Premium access
at no cost. One award per person, lifetime. Details in the app's settings.
We may limit awards to a monthly budget and reject suspected abuse.

## 6. Acceptable Use

You agree **not** to:
- Upload content that is not yours (other people's résumés, copyrighted
  material you don't have rights to)
- Upload malicious files
- Reverse-engineer, scrape, or attempt to bypass subscription limits
- Use the App to harass, impersonate, or discriminate against any person
- Use the App for automated decision-making that affects other people's
  employment, compensation, or legal rights
- Attempt to extract training data from the underlying AI models

Violation may result in account suspension or termination without refund.

## 7. Intellectual Property

- **Your content** (résumés, answers, goals): you own it. You grant us a
  limited license to process it for the sole purpose of providing the
  features you request.
- **AI output** (diagnoses, feedback, suggested answers): you may use it for
  any lawful purpose, including your own job search. Note that other users
  may receive similar output — we can't guarantee uniqueness.
- **Our content** (App code, design, trademarks): ours. Don't reproduce
  without written permission.

## 8. AI Disclaimers

The App uses third-party AI models (Google Gemini). AI output may be
inaccurate, biased, or inappropriate. **Treat all AI output as a draft to
review, not a final answer.**

We don't represent that the output is:
- Free of errors or bias
- Suitable for your specific situation
- Compliant with any particular legal or professional standard
- Equivalent to advice from a human expert

See Privacy Policy §4.1: **we do not train AI on your data**.

## 9. Termination

- You may delete your account at any time from in-app settings.
- We may terminate accounts for violation of these Terms, fraud, or legal
  necessity, with notice where practical.
- Upon deletion, your data is purged per Privacy Policy §7.

## 10. Disclaimers & Limitation of Liability

The App is provided **"as is"** without warranties of any kind, express or
implied, including merchantability, fitness for a particular purpose, or
non-infringement.

To the extent permitted by law, our total liability for any claim related to
the App is limited to **the greater of (a) the amount you paid us in the
12 months before the claim, or (b) USD 50**.

Nothing in these Terms excludes liability that cannot be excluded by law
(e.g. liability for gross negligence, fraud, or death caused by our
negligence under applicable jurisdictions).

## 11. Governing Law & Disputes

- Governing law: Republic of Korea (as the operator's residence).
- Disputes: informal good-faith negotiation first; if unresolved within
  60 days, exclusive jurisdiction of the courts of Seoul, Korea — except
  consumers may bring proceedings in the courts of their residence where
  required by local law.

## 12. Consumer Rights

Nothing in these Terms overrides mandatory consumer rights in your
jurisdiction. EU consumers: you may withdraw from a subscription within
14 days of purchase, subject to usage offset. Korean consumers: statutory
rights under 전자상거래법 apply.

## 13. Changes

We'll notify you of material changes in-app and by email at least 30 days
before they take effect. Continued use after that date means you accept the
new Terms. If you don't, stop using the App and cancel your subscription.
